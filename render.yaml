# render.yaml — Configuration de déploiement sur Render 

services:
  - type: web
    name: devsummarizer-api
    env: node
    region: frankfurt          
    plan: free                 
    rootDir: backend           
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false            
      - key: GITHUB_TOKEN
        sync: false            
      - key: FRONTEND_URL
        sync: false            
